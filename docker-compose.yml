version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: delfin_postgres
    environment:
      POSTGRES_USER: delfin
      POSTGRES_PASSWORD: delfin_password
      POSTGRES_DB: delfin_buyers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delfin -d delfin_buyers"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
